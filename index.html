<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Painter - Web Version</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Image Painter</h1>

        <div class="controls-section">
            <div class="button-group">
                <button id="loadBtn">Load Image</button>
                <button id="saveBtn">Save</button>
                <button id="saveViewBtn">Save View</button>
            </div>

            <div class="input-group">
                <label>Width: <input type="number" id="widthInput" min="1" value="800"></label>
                <label>Height: <input type="number" id="heightInput" min="1" value="600"></label>
                <button id="resizeBtn">Resize</button>
            </div>

            <div class="dropdown-group">
                <label>View Mode:
                    <select id="viewMode">
                        <option value="RGBA">RGBA</option>
                        <option value="Grayscale">Grayscale</option>
                        <option value="Binary">Binary</option>
                        <option value="Contours">Contours</option>
                        <option value="Flood Fill">Flood Fill</option>
                    </select>
                </label>
                <label>Mouse Mode:
                    <select id="mouseMode">
                        <option value="Drag">Drag</option>
                        <option value="Random Color">Random Color</option>
                        <option value="Paint Color">Paint Color</option>
                        <option value="Pick Color">Pick Color</option>
                    </select>
                </label>
            </div>

            <div class="button-group">
                <button id="undoBtn">Undo</button>
                <button id="redoBtn">Redo</button>
                <button id="zoomInBtn">Zoom In</button>
                <button id="zoomOutBtn">Zoom Out</button>
                <button id="zoomResetBtn">Reset Zoom</button>
            </div>

            <div class="color-group">
                <label>Color:</label>
                <button id="pickColorBtn">Pick</button>
                <span id="colorPreview" class="color-preview"></span>
                <label>R: <input type="number" id="rInput" class="color-input" min="0" max="255" value="255"></label>
                <label>G: <input type="number" id="gInput" class="color-input" min="0" max="255" value="0"></label>
                <label>B: <input type="number" id="bInput" class="color-input" min="0" max="255" value="0"></label>
                <label>A: <input type="number" id="aInput" class="color-input" min="0" max="255" value="255"></label>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>

        <div class="info-section">
            <div id="info" class="info-text">No image loaded</div>
            <div id="contourInfo" class="info-text"></div>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <script src="js/imageprocessing.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
